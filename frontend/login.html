<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — Gestão de OS</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    body { font-family: 'Inter', system-ui, sans-serif; }
    .fade-in { animation: fadeIn 0.3s ease both; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body class="bg-[#0d0d12] text-gray-100 min-h-screen flex items-center justify-center p-4">

  <div class="w-full max-w-sm fade-in">

    <!-- Brand -->
    <div class="flex flex-col items-center mb-8">
      <div class="w-12 h-12 rounded-2xl bg-gradient-to-br from-blue-500 to-blue-700 flex items-center justify-center shadow-lg shadow-blue-900/40 mb-4">
        <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
        </svg>
      </div>
      <h1 class="text-xl font-bold text-white">Gestão de OS</h1>
      <p class="text-sm text-gray-500 mt-1">Impressão &amp; Gráfica</p>
    </div>

    <!-- Card -->
    <div class="bg-[#17171f] border border-gray-700/60 rounded-2xl p-6 shadow-2xl">
      <h2 class="text-base font-semibold text-white mb-5">Entrar no sistema</h2>

      <!-- Erro -->
      <div id="error-box"
        class="hidden mb-4 flex items-center gap-2 bg-red-950/80 border border-red-800/60 text-red-300 text-sm px-4 py-3 rounded-xl">
        <svg class="w-4 h-4 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
        </svg>
        <span id="error-text"></span>
      </div>

      <form id="login-form" onsubmit="doLogin(event)">
        <div class="mb-4">
          <label class="block text-xs font-medium text-gray-400 mb-1.5">Usuário</label>
          <input id="username" type="text" autocomplete="username" autofocus
            class="w-full bg-gray-800/70 border border-gray-700/50 rounded-lg px-3 py-2.5 text-sm text-gray-100 placeholder-gray-600
                   focus:outline-none focus:border-blue-500/70 focus:ring-1 focus:ring-blue-500/30 transition-all"
            placeholder="Digite seu usuário" />
        </div>
        <div class="mb-5">
          <label class="block text-xs font-medium text-gray-400 mb-1.5">Senha</label>
          <input id="password" type="password" autocomplete="current-password"
            class="w-full bg-gray-800/70 border border-gray-700/50 rounded-lg px-3 py-2.5 text-sm text-gray-100 placeholder-gray-600
                   focus:outline-none focus:border-blue-500/70 focus:ring-1 focus:ring-blue-500/30 transition-all"
            placeholder="Digite sua senha" />
        </div>
        <button type="submit" id="submit-btn"
          class="w-full py-2.5 px-4 rounded-xl text-sm font-semibold
                 bg-blue-600 hover:bg-blue-500 active:bg-blue-700
                 text-white transition-all shadow-lg shadow-blue-900/30
                 disabled:opacity-50 disabled:cursor-not-allowed
                 flex items-center justify-center gap-2">
          <span id="btn-label">Entrar</span>
        </button>
      </form>
    </div>

  </div>

  <script>
    // Já está logado — vai para o dashboard
    if (localStorage.getItem('token')) window.location.replace('/');

    async function doLogin(e) {
      e.preventDefault();
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;

      if (!username || !password) { showError('Preencha usuário e senha'); return; }

      const btn   = document.getElementById('submit-btn');
      const label = document.getElementById('btn-label');
      btn.disabled = true;
      label.textContent = 'Entrando…';
      document.getElementById('error-box').classList.add('hidden');

      try {
        const res  = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });
        const json = await res.json();

        if (!res.ok) { showError(json.error || 'Credenciais inválidas'); return; }

        localStorage.setItem('token',    json.token);
        localStorage.setItem('username', json.username);
        window.location.replace('/');
      } catch {
        showError('Erro de conexão. Tente novamente.');
      } finally {
        btn.disabled = false;
        label.textContent = 'Entrar';
      }
    }

    function showError(msg) {
      document.getElementById('error-text').textContent = msg;
      document.getElementById('error-box').classList.remove('hidden');
    }
  </script>
</body>
</html>
